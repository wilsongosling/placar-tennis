<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Placar de Tênis Pro Sync</title>
    
    <!-- Scripts do Firebase Estáveis (Via CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* TELA DE CONFIGURAÇÃO */
        #tela-config { padding: 20px; display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; height: 100vh; overflow-y: auto; }
        h2 { text-align: center; color: #00FF66; margin-bottom: 5px; font-size: 20px; }
        .campo { display: flex; flex-direction: column; gap: 4px; }
        .campo-duplo { display: flex; gap: 10px; }
        .campo-duplo .campo { flex: 1; }
        label { font-size: 13px; color: #aaa; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 15px; width: 100%; }
        input::placeholder { color: #555; }
        .btn-iniciar { background: #00FF66; color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 5px; }
        
        .divisor { text-align: center; color: #555; margin: 10px 0; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-conectar { background: #00E0FF; color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; }

        /* TELA DO PLACAR */
        #tela-placar { display: none; height: 100vh; width: 100vw; flex-direction: column; position: relative; }
        #info-sala { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #00E0FF; font-weight: bold; z-index: 100; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
        
        .btn-jogador { border: none; background: transparent; color: #fff; font-size: 44px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; flex: 1; }
        .nome-jogador { font-size: 13px; color: #00FF66; position: absolute; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PAINEL CENTRAL UNIVERSAL */
        .painel-central { background: #111; display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 2px solid #222; z-index: 10; }
        
        .display-pontos { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .label-pequena { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        .num-pontos { font-size: 22px; font-weight: 800; color: #00FF66; margin-top: 2px; }
        
        .display-sets { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; border-left: 1px solid #333; border-right: 1px solid #333; height: 100%; flex: 1; margin: 0 10px; }
        .linha-set { display: flex; gap: 6px; color: #888; align-items: center; width: 100%; justify-content: center; }
        .game-atual { color: #FFA500; font-weight: bold; font-size: 16px; margin-right: 4px; min-width: 15px; text-align: center; }
        .set-ganho { font-weight: 900; color: #fff; text-decoration: underline; }

        .btn-acao-painel { background: #222; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; padding: 8px; }
        .btn-desfazer { color: #ff4444; font-size: 11px; }
        .btn-menu { color: #aaa; font-size: 11px; display: none; }

        /* LAYOUT PORTRAIT (Watch e Celular em pé) */
        @media (orientation: portrait) {
            #tela-placar { flex-direction: column; }
            #btn-jogA { align-items: flex-start; padding-top: 25px; border-bottom: 1px dashed #333; }
            #btn-jogB { align-items: flex-end; padding-bottom: 25px; border-top: 1px dashed #333; }
            #btn-jogA .nome-jogador { top: 8px; }
            #btn-jogB .nome-jogador { bottom: 8px; }
            .painel-central { height: 16vh; width: 100vw; flex-direction: row; }
            .display-pontos { width: 30%; }
            .btn-acao-painel { width: 22%; height: 80%; }
        }

        /* LAYOUT LANDSCAPE (Celular deitado) */
        @media (orientation: landscape) {
            #tela-placar { flex-direction: row; }
            #btn-jogA { border-right: 1px dashed #333; order: 1; }
            .painel-central { width: 28vw; height: 100vh; flex-direction: column; justify-content: space-around; order: 2; border-top: none; border-bottom: none; border-left: 2px solid #222; border-right: 2px solid #222; padding: 20px 10px; }
            #btn-jogB { border-left: 1px dashed #333; order: 3; }
            
            .nome-jogador { top: 15px !important; bottom: auto !important; font-size: 16px; }
            .btn-jogador { font-size: 70px; }
            
            .display-pontos { width: 100%; }
            .display-sets { border-left: none; border-right: none; border-top: 1px solid #333; border-bottom: 1px solid #333; width: 100%; padding: 15px 0; margin: 15px 0; }
            .linha-set { font-size: 16px; }
            .game-atual { font-size: 20px; }
            
            .btn-acao-painel { width: 90%; height: 40px; font-size: 13px; }
            .btn-menu { display: flex; }
        }
    </style>
</head>
<body>

    <!-- TELA DE CONFIGURAÇÃO -->
    <div id="tela-config">
        <h2>Configurar Jogo</h2>
        
        <div class="campo-duplo">
            <div class="campo">
                <label>Jogador A (Top/Esq):</label>
                <input type="text" id="cfg-nomeA" value="Jogador A" maxlength="12">
            </div>
            <div class="campo">
                <label>Jogador B (Baixo/Dir):</label>
                <input type="text" id="cfg-nomeB" value="Jogador B" maxlength="12">
            </div>
        </div>

        <div class="campo">
            <label>Vantagens no Game:</label>
            <select id="cfg-vantagens">
                <option value="sem_limites">Sem Limites (Padrão)</option>
                <option value="1">Apenas 1 Vantagem</option>
                <option value="0">Sem Vantagem (Ponto de Ouro)</option>
            </select>
        </div>
        <div class="campo">
            <label>Tie-break no empate (6x6)?</label>
            <select id="cfg-tiebreak">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
        <div class="campo">
            <label>Tipo de limite do Tie-break:</label>
            <select id="cfg-tipo-tb" onchange="alternarVisibilidadeLimiteTb()">
                <option value="infinito">Infinito (Vencer por 2)</option>
                <option value="com_limite">Com Limite Máximo de Pontos</option>
            </select>
        </div>
        <div class="campo" id="campo-limite-tb" style="display: none;">
            <label>Pontuação máxima do Tie-break:</label>
            <input type="number" id="cfg-limite-pontos-tb" value="10" min="5" max="30">
        </div>
        <div class="campo-duplo">
            <div class="campo">
                <label>Sets p/ vencer:</label>
                <input type="number" id="cfg-sets" value="2" min="1" max="10">
            </div>
            <div class="campo">
                <label>Games por Set:</label>
                <input type="number" id="cfg-games" value="6" min="1" max="10">
            </div>
        </div>
        <button class="btn-iniciar" onclick="iniciarJogo()">COMEÇAR JOGO</button>

        <div class="divisor">Ou controle pelo Watch</div>

        <div class="campo">
            <label>Código da Sala (Gerado no Celular):</label>
            <input type="number" id="cfg-codigo-sala" placeholder="Ex: 4829">
        </div>
        <button class="btn-conectar" onclick="conectarComoRelogio()">CONECTAR VIA RELÓGIO</button>
    </div>

    <!-- TELA DO PLACAR -->
    <div id="tela-placar">
        <div id="info-sala">SALA: ----</div>
        <button id="btn-jogA" class="btn-jogador" onclick="pontuar('A')">
            <span class="nome-jogador" id="label-nomeA">JOGADOR A</span>
            <span id="pontosA">0</span>
        </button>

        <div class="painel-central">
            <button class="btn-acao-painel btn-menu" onclick="voltarAoMenu()">MENU</button>

            <div class="display-pontos">
                <span id="rotuloPontos" class="label-pequena">PONTOS</span>
                <span class="num-pontos"><span id="ptA">0</span>:<span id="ptB">0</span></span>
            </div>

            <div class="display-sets">
                <span class="label-pequena">GAMES (SETS)</span>
                <div class="linha-set">
                    <span class="game-atual" id="gamesA">0</span>
                    <span id="setsPassadosA"></span>
                </div>
                <div class="linha-set">
                    <span class="game-atual" id="gamesB">0</span>
                    <span id="setsPassadosB"></span>
                </div>
            </div>

            <button class="btn-acao-painel btn-desfazer" onclick="desfazer()">CORRIGIR</button>
        </div>

        <button id="btn-jogB" class="btn-jogador" onclick="pontuar('B')">
            <span class="nome-jogador" id="label-nomeB">JOGADOR B</span>
            <span id="pontosB">0</span>
        </button>
    </div>

    <script>
        // Configurações do seu Console Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCrXBORBx_2Y-ifCPsJGENFSB7MDuDCxDQ",
            authDomain: "placar-tennis.firebaseapp.com",
            databaseURL: "https://placar-tennis-default-rtdb.firebaseio.com",
            projectId: "placar-tennis",
            storageBucket: "placar-tennis.firebasestorage.app",
            messagingSenderId: "332190545970",
            appId: "1:332190545970:web:4c9744882aa538a3b3a42b"
        };

        // Inicialização Correta do Firebase Compat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let salaId = null;
        let ehRelogio = false;
        let ultimoPlacarFalado = "";

        let configs = { nomeA: "Jogador A", nomeB: "Jogador B", limiteVantagens: "sem_limites", usarTieBreak: true, tipoTb: "infinito", limitePontosTb: 10, setsParaVencer: 2, gamesParaVencerSet: 6 };
        let jogo = { pontosA: 0, pontosB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0, contadorDeuces: 0, emTieBreak: false, pontosTbA: 0, pontosTbB: 0, historicoSets: [], partidaEncerrada: false, historico: [], ultimaAcaoId: 0 };
        const nomesPontos = { 0: "0", 1: "15", 2: "30", 3: "40" };

        function falarPlacar(texto) {
            if ('speechSynthesis' in window && !ehRelogio) {
                window.speechSynthesis.cancel();
                let fala = new SpeechSynthesisUtterance(texto);
                fala.lang = 'pt-BR';
                fala.rate = 1.15; 
                window.speechSynthesis.speak(fala);
            }
        }

        function gerarTextoLocucao(jogadorPontuou) {
            if (jogo.partidaEncerrada) {
                let nomeVencedor = jogo.setsA > jogo.setsB ? configs.nomeA : configs.nomeB;
                return `Vitória de ${nomeVencedor}! Fim de jogo.`;
            }

            if (jogo.pontosA === 0 && jogo.pontosB === 0 && jogo.gamesA === 0 && jogo.gamesB === 0 && jogo.historicoSets.length > 0) {
                let ultimoSet = jogo.historicoSets[jogo.historicoSets.length - 1];
                let nomeSetVencedor = ultimoSet.vencedor === 'A' ? configs.nomeA : configs.nomeB;
                return `Set para ${nomeSetVencedor}. ${Math.max(ultimoSet.a, ultimoSet.b)} ${Math.min(ultimoSet.a, ultimoSet.b)}.`;
            }

            if (jogo.pontosA === 0 && jogo.pontosB === 0 && !jogo.emTieBreak) {
                let nomeGameVencedor = jogadorPontuou === 'A' ? configs.nomeA : configs.nomeB;
                return `Game ${nomeGameVencedor}. Games ${Math.max(jogo.gamesA, jogo.gamesB)} ${Math.min(jogo.gamesA, jogo.gamesB)}.`;
            }

            if (jogo.emTieBreak) {
                let tA = jogo.pontosTbA; let tB = jogo.pontosTbB;
                if (tA === tB) return `${tA} iguais.`;
                return tA > tB ? `${tA} ${tB}, ${configs.nomeA}.` : `${tB} ${tA}, ${configs.nomeB}.`;
            }

            let p = obterPlacarTexto();
            if (p.a === "Adv") return `Vantagem ${configs.nomeA}.`;
            if (p.b === "Adv") return `Vantagem ${configs.nomeB}.`;
            if (jogo.pontosA === 3 && jogo.pontosB === 3) return "Iguais.";
            if (jogo.pontosA === jogo.pontosB && jogo.pontosA > 0) return `${nomesPontos[jogo.pontosA]} iguais.`;

            if (jogo.pontosA > jogo.pontosB) {
                return `${nomesPontos[jogo.pontosA]} ${nomesPontos[jogo.pontosB]}, ${configs.nomeA}.`;
            } else {
                return `${nomesPontos[jogo.pontosB]} ${nomesPontos[jogo.pontosA]}, ${configs.nomeB}.`;
            }
        }

        // Correção de Sintaxe de Envio
        function enviarDadosFirebase(textoLocucao = "") {
            if (!salaId) return;
            database.ref('salas/' + salaId).set({
                configs: configs,
                jogo: jogo,
                textoLocucao: textoLocucao,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // Correção de Sintaxe de Escuta
        function escutarFirebase() {
            database.ref('salas/' + salaId).on('value', (snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    configs = dados.configs;
                    jogo = dados.jogo;
                    atualizarTelaVisual();
                    
                    if (dados.textoLocucao && dados.textoLocucao !== ultimoPlacarFalado) {
                        ultimoPlacarFalado = dados.textoLocucao;
                        falarPlacar(ultimoPlacarFalado);
                    }
                }
            });
        }

        function alternarVisibilidadeLimiteTb() {
            const tipo = document.getElementById("cfg-tipo-tb").value;
            document.getElementById("campo-limite-tb").style.display = tipo === "com_limite" ? "flex" : "none";
        }

        function iniciarJogo() {
            salaId = Math.floor(1000 + Math.random() * 9000).toString();
            ehRelogio = false;

            configs.nomeA = document.getElementById("cfg-nomeA").value.trim() || "Jogador A";
            configs.nomeB = document.getElementById("cfg-nomeB").value.trim() || "Jogador B";
            configs.limiteVantagens = document.getElementById("cfg-vantagens").value;
            configs.usarTieBreak = document.getElementById("cfg-tiebreak").value === "sim";
            configs.tipoTb = document.getElementById("cfg-tipo-tb").value;
            configs.limitePontosTb = parseInt(document.getElementById("cfg-limite-pontos-tb").value) || 10;
            configs.setsParaVencer = parseInt(document.getElementById("cfg-sets").value) || 2;
            configs.gamesParaVencerSet = parseInt(document.getElementById("cfg-games").value) || 6;
            
            document.getElementById("tela-config").style.display = "none";
            document.getElementById("tela-placar").style.display = "flex";
            
            escutarFirebase();
            enviarDadosFirebase("Jogo iniciado. Boa partida!");
        }

        function conectarComoRelogio() {
            let codigoDigitado = document.getElementById("cfg-codigo-sala").value.trim();
            if (!codigoDigitado) { alert("Digite o código gerado no celular!"); return; }
            
            salaId = codigoDigitado;
            ehRelogio = true;

            database.ref('salas/' + salaId).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById("tela-config").style.display = "none";
                    document.getElementById("tela-placar").style.display = "flex";
                    escutarFirebase();
                } else {
                    alert("Sala não encontrada! Inicie o jogo no celular primeiro.");
                }
            });
        }

        function voltarAoMenu() {
            if (confirm("Deseja voltar ao menu? Isso limpará a sala atual.")) {
                window.speechSynthesis.cancel();
                if (salaId && !ehRelogio) { database.ref('salas/' + salaId).remove(); }
                location.reload();
            }
        }

        function salvarHistorico() {
            jogo.historico.push(JSON.stringify({
                pontosA: jogo.pontosA, pontosB: jogo.pontosB, gamesA: jogo.gamesA, gamesB: jogo.gamesB,
                setsA: jogo.setsA, setsB: jogo.setsB, contadorDeuces: jogo.contadorDeuces,
                emTieBreak: jogo.emTieBreak, pontosTbA: jogo.pontosTbA, pontosTbB: delete jogo.pontosTbB,
                historicoSets: [...jogo.historicoSets], partidaEncerrada: jogo.partidaEncerrada
            }));
            jogo.ultimaAcaoId = Date.now();
        }

        function pontuar(jogador) {
            if (jogo.partidaEncerrada) return;
            salvarHistorico();

            if (jogo.emTieBreak) {
                jogo[`pontosTb${jogador}`]++;
                let tA = jogo.pontosTbA; let tB = jogo.pontosTbB;
                if (configs.tipoTb === "com_limite") {
                    if (tA === configs.limitePontosTb) { colocarSet('A'); finalizarPonto('A'); return; }
                    if (tB === configs.limitePontosTb) { colocarSet('B'); finalizarPonto('B'); return; }
                }
                if (tA >= 7 && (tA - tB) >= 2) { colocarSet('A'); } 
                else if (tB >= 7 && (tB - tA) >= 2) { colocarSet('B'); }
            } else {
                processarPontuacaoNormal(jogador, jogador === 'A' ? 'B' : 'A');
            }
            finalizarPonto(jogador);
        }

        function finalizarPonto(jogador) {
            let textoFalar = gerarTextoLocucao(jogador);
            enviarDadosFirebase(textoFalar);
        }

        function processarPontuacaoNormal(ganhador, perdedor) {
            let pGanhador = `pontos${ganhador}`; let pPerdedor = `pontos${perdedor}`;
            if (configs.limiteVantagens === "0" && jogo[pGanhador] === 3 && jogo[pPerdedor] === 3) { colocarGame(ganhador); return; }
            if (jogo[pGanhador] === 4) { colocarGame(ganhador); return; }
            if (jogo[pPerdedor] === 4) { jogo[pPerdedor] = 3; return; }
            if (jogo[pGanhador] === 3 && jogo[pPerdedor] === 3) {
                jogo.contadorDeuces++;
                if (configs.limiteVantagens === "1" && jogo.contadorDeuces > 1) { colocarGame(ganhador); } else { jogo[pGanhador] = 4; }
                return;
            }
            if (jogo[pGanhador] === 3 && jogo[pPerdedor] < 3) { colocarGame(ganhador); return; }
            jogo[pGanhador]++;
        }

        function colocarGame(jogador) {
            let gMax = configs.gamesParaVencerSet;
            jogo[`games${jogador}`]++;
            jogo.pontosA = 0; jogo.pontosB = 0; jogo.contadorDeuces = 0;
            let gA = jogo.gamesA; let gB = jogo.gamesB;

            if (configs.usarTieBreak && gA === gMax && gB === gMax) { jogo.emTieBreak = true; jogo.pontosTbA = 0; jogo.pontosTbB = 0; return; }
            if (gA >= gMax || gB >= gMax) {
                if (gA >= gMax && (gA - gB) >= 2) { colocarSet('A'); } else if (gB >= gMax && (gB - gA) >= 2) { colocarSet('B'); }
            }
        }

        function colocarSet(jogador) {
            jogo.historicoSets.push({ a: jogo.gamesA, b: jogo.gamesB, vencedor: jogador });
            jogo[`sets${jogador}`]++;
            jogo.gamesA = 0; jogo.gamesB = 0; jogo.emTieBreak = false;
            jogo.pontosTbA = 0; jogo.pontosTbB = 0;
            if (jogo.setsA === configs.setsParaVencer || jogo.setsB === configs.setsParaVencer) { jogo.partidaEncerrada = true; }
        }

        function desfazer() {
            if (jogo.historico.length > 0) {
                let e = JSON.parse(jogo.historico.pop());
                Object.assign(jogo, e);
                jogo.ultimaAcaoId = Date.now();
                enviarDadosFirebase("Ponto desfeito.");
            }
        }

        function obtenerPlacarTexto() {
            if (jogo.emTieBreak) return { a: jogo.pontosTbA, b: jogo.pontosTbB };
            if (jogo.pontosA === 4) return { a: "Adv", b: "40" };
            if (jogo.pontosB === 4) return { a: "40", b: "Adv" };
            if (jogo.pontosA === 3 && jogo.pontosB === 3) return { a: "40", b: "40" };
            return { a: nomesPontos[jogo.pontosA], b: nomesPontos[jogo.pontosB] };
        }

        function atualizarTelaVisual() {
            let p = obterPlacarTexto();
            document.getElementById("info-sala").innerText = `SALA: ${salaId}`;
            document.getElementById("label-nomeA").innerText = configs.nomeA;
            document.getElementById("label-nomeB").innerText = configs.nomeB;
            
            document.getElementById("pontosA").innerText = p.a;
            document.getElementById("pontosB").innerText = p.b;
            document.getElementById("ptA").innerText = p.a;
            document.getElementById("ptB").innerText = p.b;
            document.getElementById("gamesA").innerText = jogo.gamesA;
            document.getElementById("gamesB").innerText = jogo.gamesB;
            document.getElementById("rotuloPontos").innerText = jogo.emTieBreak ? "TIE-BRK" : "PONTOS";

            let htmlSetsA = ""; let htmlSetsB = "";
            jogo.historicoSets.forEach(set => {
                let classeA = set.vencedor === 'A' ? 'class="set-ganho"' : '';
                let classeB = set.vencedor === 'B' ? 'class="set-ganho"' : '';
                htmlSetsA += `<span ${classeA}>&nbsp;${set.a}&nbsp;</span>`;
                htmlSetsB += `<span ${classeB}>&nbsp;${set.b}&nbsp;</span>`;
            });
            document.getElementById("setsPassadosA").innerHTML = htmlSetsA;
            document.getElementById("setsPassadosB").innerHTML = htmlSetsB;

            if (jogo.partidaEncerrada) { 
                let nomeVencedor = jogo.setsA > jogo.setsB ? configs.nomeA : configs.nomeB;
                alert(`Fim de jogo! Vencedor: ${nomeVencedor}`); 
            }
        }
    </script>
</body>
</html>
