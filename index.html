<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Placar de Tênis Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* TELA DE CONFIGURAÇÃO */
        #tela-config { padding: 20px; display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: 0 auto; height: 100vh; overflow-y: auto; }
        h2 { text-align: center; color: #00FF66; margin-bottom: 5px; font-size: 20px; }
        .campo { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 13px; color: #aaa; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 15px; }
        .btn-iniciar { background: #00FF66; color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 5px; }

        /* TELA DO PLACAR (Otimizada para Apple Watch) */
        #tela-placar { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        .btn-jogador { width: 100%; height: 42vh; border: none; background: transparent; color: #fff; font-size: 44px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #btn-jogA { align-items: flex-start; padding-top: 20px; border-bottom: 1px dashed #333; }
        #btn-jogB { align-items: flex-end; padding-bottom: 20px; border-top: 1px dashed #333; }
        
        .nome-jogador { font-size: 12px; color: #00FF66; position: absolute; font-weight: normal; letter-spacing: 1px; }
        #btn-jogA .nome-jogador { top: 5px; }
        #btn-jogB .nome-jogador { bottom: 5px; }

        /* PAINEL CENTRAL FIXED */
        .painel-central { height: 16vh; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; border-top: 2px solid #222; border-bottom: 2px solid #222; }
        
        .display-pontos { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 33%; }
        .label-pequena { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        .num-pontos { font-size: 20px; font-weight: 800; color: #00FF66; margin-top: 2px; }
        
        .display-sets { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 47%; font-size: 12px; border-left: 1px solid #333; border-right: 1px solid #333; height: 100%; }
        .linha-set { display: flex; gap: 5px; color: #888; align-items: center; width: 100%; justify-content: center; }
        .game-atual { color: #FFA500; font-weight: bold; font-size: 15px; margin-right: 4px; }
        .set-ganho { font-weight: 900; color: #fff; text-decoration: underline; }

        .btn-desfazer { width: 20%; height: 100%; background: #222; border: none; color: #ff4444; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="tela-config">
        <h2>Configurar Jogo</h2>
        <div class="campo">
            <label>Vantagens no Game:</label>
            <select id="cfg-vantagens">
                <option value="sem_limites">Sem Limites (Padrão)</option>
                <option value="1">Apenas 1 Vantagem</option>
                <option value="0">Sem Vantagem (Ponto de Ouro)</option>
            </select>
        </div>
        <div class="campo">
            <label>Tie-break no empate (6x6)?</label>
            <select id="cfg-tiebreak">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>
        <div class="campo">
            <label>Tipo de limite do Tie-break:</label>
            <select id="cfg-tipo-tb" onchange="alternarVisibilidadeLimiteTb()">
                <option value="infinito">Infinito (Vencer por 2)</option>
                <option value="com_limite">Com Limite Máximo de Pontos</option>
            </select>
        </div>
        <div class="campo" id="campo-limite-tb" style="display: none;">
            <label>Pontuação máxima do Tie-break (ex: 10):</label>
            <input type="number" id="cfg-limite-pontos-tb" value="10" min="5" max="30">
        </div>
        <div class="campo">
            <label>Sets por partida (Para vencer):</label>
            <input type="number" id="cfg-sets" value="2" min="1" max="10">
        </div>
        <div class="campo">
            <label>Games por Set (Para vencer padrão):</label>
            <input type="number" id="cfg-games" value="6" min="1" max="10">
        </div>
        <button class="btn-iniciar" onclick="iniciarJogo()">COMEÇAR JOGO</button>
    </div>

    <div id="tela-placar">
        <button id="btn-jogA" class="btn-jogador" onclick="pontuar('A')">
            <span class="nome-jogador">JOGADOR A</span>
            <span id="pontosA">0</span>
        </button>

        <div class="painel-central">
            <div class="display-pontos">
                <span id="rotuloPontos" class="label-pequena">PONTOS</span>
                <span class="num-pontos"><span id="ptA">0</span>:<span id="ptB">0</span></span>
            </div>

            <div class="display-sets">
                <span class="label-pequena">GAMES (SETS)</span>
                <div class="linha-set" id="historicoA">
                    <span class="game-atual" id="gamesA">0</span>
                    <span id="setsPassadosA"></span>
                </div>
                <div class="linha-set" id="historicoB">
                    <span class="game-atual" id="gamesB">0</span>
                    <span id="setsPassadosB"></span>
                </div>
            </div>

            <button class="btn-desfazer" onclick="desfazer()">CORRIGIR</button>
        </div>

        <button id="btn-jogB" class="btn-jogador" onclick="pontuar('B')">
            <span class="nome-jogador">JOGADOR B</span>
            <span id="pontosB">0</span>
        </button>
    </div>

    <script>
        let configs = { limiteVantagens: "sem_limites", usarTieBreak: true, tipoTb: "infinito", limitePontosTb: 10, setsParaVencer: 2, gamesParaVencerSet: 6 };
        let jogo = { pontosA: 0, pontosB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0, contadorDeuces: 0, emTieBreak: false, pontosTbA: 0, pontosTbB: 0, historicoSets: [], partidaEncerrada: false, historico: [] };
        const nomesPontos = { 0: "0", 1: "15", 2: "30", 3: "40" };

        function alternarVisibilidadeLimiteTb() {
            const tipo = document.getElementById("cfg-tipo-tb").value;
            document.getElementById("campo-limite-tb").style.display = tipo === "com_limite" ? "flex" : "none";
        }

        function iniciarJogo() {
            configs.limiteVantagens = document.getElementById("cfg-vantagens").value;
            configs.usarTieBreak = document.getElementById("cfg-tiebreak").value === "sim";
            configs.tipoTb = document.getElementById("cfg-tipo-tb").value;
            configs.limitePontosTb = parseInt(document.getElementById("cfg-limite-pontos-tb").value);
            configs.setsParaVencer = parseInt(document.getElementById("cfg-sets").value);
            configs.gamesParaVencerSet = parseInt(document.getElementById("cfg-games").value);
            
            document.getElementById("tela-config").style.display = "none";
            document.getElementById("tela-placar").style.display = "flex";
            atualizarTela();
        }

        function salvarHistorico() {
            jogo.historico.push(JSON.stringify({
                pontosA: jogo.pontosA, pontosB: jogo.pontosB, gamesA: jogo.gamesA, gamesB: jogo.gamesB,
                setsA: jogo.setsA, setsB: jogo.setsB, contadorDeuces: jogo.contadorDeuces,
                emTieBreak: jogo.emTieBreak, pontosTbA: jogo.pontosTbA, pontosTbB: jogo.pontosTbB,
                historicoSets: [...jogo.historicoSets], partidaEncerrada: jogo.partidaEncerrada
            }));
        }

        function pontuar(jogador) {
            if (jogo.partidaEncerrada) return;
            salvarHistorico();

            if (jogo.emTieBreak) {
                processarPontuacaoTieBreak(jogador);
            } else {
                processarPontuacaoNormal(jogador, jogador === 'A' ? 'B' : 'A');
            }
            atualizarTela();
        }

        function processarPontuacaoNormal(ganhador, perdedor) {
            let pGanhador = `pontos${ganhador}`; let pPerdedor = `pontos${perdedor}`;
            if (configs.limiteVantagens === "0" && jogo[pGanhador] === 3 && jogo[pPerdedor] === 3) { ganharGame(ganhador); return; }
            if (jogo[pGanhador] === 4) { ganharGame(ganhador); return; }
            if (jogo[pPerdedor] === 4) { jogo[pPerdedor] = 3; return; }
            if (jogo[pGanhador] === 3 && jogo[pPerdedor] === 3) {
                jogo.contadorDeuces++;
                if (configs.limiteVantagens === "1" && jogo.contadorDeuces > 1) { ganharGame(ganhador); } else { jogo[pGanhador] = 4; }
                return;
            }
            if (jogo[pGanhador] === 3 && jogo[pPerdedor] < 3) { ganharGame(ganhador); return; }
            jogo[pGanhador]++;
        }

        function processarPontuacaoTieBreak(jogador) {
            jogo[`pontosTb${jogador}`]++;
            let tA = jogo.pontosTbA; let tB = jogo.pontosTbB;

            // Se o usuário ativou o limite teto máximo de pontos do Tie-break (ex: 10)
            if (configs.tipoTb === "com_limite") {
                if (tA === configs.limitePontosTb) { ganharSet('A'); return; }
                if (tB === configs.limitePontosTb) { ganharSet('B'); return; }
            }

            // Regra normal de vitória do TB: mínimo de 7 pontos e abrir 2 de vantagem
            if (tA >= 7 && (tA - tB) >= 2) { ganharSet('A'); } 
            else if (tB >= 7 && (tB - tA) >= 2) { ganharSet('B'); }
        }

        function ganharGame(jogador) {
            let gMax = configs.gamesParaVencerSet;
            jogo[`games${jogador}`]++;
            jogo.pontosA = 0; jogo.pontosB = 0; jogo.contadorDeuces = 0;
            let gA = jogo.gamesA; let gB = jogo.gamesB;

            // REGRA ENVIADA POR VOCÊ: Se empatar no limite (ex: 6x6), vai para o Tie-break
            if (configs.usarTieBreak && gA === gMax && gB === gMax) { 
                jogo.emTieBreak = true; 
                jogo.pontosTbA = 0; 
                jogo.pontosTbB = 0; 
                return; 
            }

            // Se não houver tie-break configurado, precisa abrir obrigatoriamente 2 games após o limite
            if (!configs.usarTieBreak) {
                if (gA >= gMax && (gA - gB) >= 2) { ganharSet('A'); } 
                else if (gB >= gMax && (gB - gA) >= 2) { ganharSet('B'); }
                return;
            }

            // REGRA ENVIADA POR VOCÊ: Se chegar a 5x5, quem fizer 7 ganha o set (ex: 7x5)
            // Se um jogador atingiu o limite de games (ex: 6) e o outro tem menos de (limite - 1, ex: 4), fecha o set.
            if (gA >= gMax && (gA - gB) >= 2) { ganharSet('A'); }
            else if (gB >= gMax && (gB - gA) >= 2) { ganharSet('B'); }
        }

        function ganharSet(jogador) {
            jogo.historicoSets.push({ a: jogo.gamesA, b: jogo.gamesB, vencedor: ...[jogador] });
            jogo[`sets${jogador}`]++;
            jogo.gamesA = 0; jogo.gamesB = 0; jogo.emTieBreak = false;
            jogo.pontosTbA = 0; jogo.pontosTbB = 0;
            if (jogo.setsA === configs.setsParaVencer || jogo.setsB === configs.setsParaVencer) { jogo.partidaEncerrada = true; }
        }

        function desfazer() {
            if (jogo.historico.length > 0) {
                let e = JSON.parse(jogo.historico.pop());
                Object.assign(jogo, e);
                atualizarTela();
            }
        }

        function obterPlacarTexto() {
            if (jogo.emTieBreak) return { a: jogo.pontosTbA, b: jogo.pontosTbB };
            if (jogo.pontosA === 4) return { a: "Adv", b: "40" };
            if (jogo.pontosB === 4) return { a: "40", b: "Adv" };
            if (jogo.pontosA === 3 && jogo.pontosB === 3) return { a: "40", b: "40" };
            return { a: nomesPontos[jogo.pontosA], b: nomesPontos[jogo.pontosB] };
        }

        function atualizarTela() {
            let p = obterPlacarTexto();
            document.getElementById("pontosA").innerText = p.a;
            document.getElementById("pontosB").innerText = p.b;
            document.getElementById("ptA").innerText = p.a;
            document.getElementById("ptB").innerText = p.b;
            document.getElementById("gamesA").innerText = jogo.gamesA;
            document.getElementById("gamesB").innerText = jogo.gamesB;
            document.getElementById("rotuloPontos").innerText = jogo.emTieBreak ? "TIE-BRK" : "PONTOS";

            let htmlSetsA = ""; let htmlSetsB = "";
            jogo.historicoSets.forEach(set => {
                let classeA = set.vencedor === 'A' ? 'class="set-ganho"' : '';
                let classeB = set.vencedor === 'B' ? 'class="set-ganho"' : '';
                htmlSetsA += `<span ${classeA}>&nbsp;${set.a}&nbsp;</span>`;
                htmlSetsB += `<span ${classeB}>&nbsp;${set.b}&nbsp;</span>`;
            });
            document.getElementById("setsPassadosA").innerHTML = htmlSetsA;
            document.getElementById("setsPassadosB").innerHTML = htmlSetsB;

            if (jogo.partidaEncerrada) { alert(`Fim de jogo! Vencedor: Jogador ${jogo.setsA > jogo.setsB ? 'A' : 'B'}`); }
        }
    </script>
</body>
</html>
